<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}

  ::-webkit-scrollbar-track{background:#070D0C;}
  ::-webkit-scrollbar-thumb{background:rgba(0,214,161,0.25);border-radius:0;}
  @keyframes mrGridDrift{from{background-position:0 0;}to{background-position:54px 54px;}}
  @keyframes mrScan{from{transform:translateY(0);}to{transform:translateY(8px);}}
  @keyframes mrBlink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @keyframes mrMarquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @keyframes mrPulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
  @keyframes mrFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  @keyframes mrSweep{0%{opacity:0;transform:translateX(-30%);}50%{opacity:0.6;}100%{opacity:0;transform:translateX(130%);}}

  .mr-js [data-reveal]{opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.16,.84,.44,1),transform .8s cubic-bezier(.16,.84,.44,1);}
  .mr-js [data-reveal="left"]{transform:translateX(-34px);}
  .mr-js [data-reveal="right"]{transform:translateX(34px);}
  .mr-js [data-reveal="scale"]{transform:scale(.94);}
  .mr-js [data-reveal].mr-in{opacity:1;transform:none;}
  [data-reveal]:nth-child(3n+2){transition-delay:.07s;}
  [data-reveal]:nth-child(3n){transition-delay:.14s;}
  [data-float]{animation:mrFloat 7s ease-in-out infinite;}
  .mr-nav a,.mr-footer a{transition:color .2s ease;}
  .mr-nav a:hover,.mr-footer a:hover{color:#00D6A1;}
  .mr-actions a,.mr-actions button,.mr-hero a,button[type="submit"]{transition:transform .22s ease,box-shadow .25s ease,background .2s ease,border-color .2s ease;}
  .mr-actions a:hover,.mr-hero a:hover,button[type="submit"]:hover{transform:translateY(-2px);}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    .mr-js [data-reveal]{opacity:1 !important;transform:none !important;transition:none !important;}
    [data-float]{animation:none !important;}
  }
  @media (max-width:1000px){
    .mr-hero{grid-template-columns:1fr !important;gap:clamp(32px,6vw,56px) !important;}
    .mr-split{grid-template-columns:1fr !important;}
    .mr-grid-3{grid-template-columns:repeat(2,1fr) !important;}
    .mr-grid-4{grid-template-columns:repeat(2,1fr) !important;}
    .mr-footer{grid-template-columns:1fr 1fr !important;}
  }
  @media (max-width:860px){
    .mr-headrow{flex-wrap:wrap !important;gap:14px !important;}
    .mr-logo{order:1 !important;}
    .mr-actions{order:2 !important;}
    .mr-nav{order:3 !important;width:100% !important;justify-content:center !important;flex-wrap:wrap !important;gap:12px 18px !important;}
  }
  @media (max-width:680px){
    .mr-grid-2{grid-template-columns:1fr !important;}
    .mr-grid-3{grid-template-columns:1fr !important;}
    .mr-form-2{grid-template-columns:1fr !important;}
    .mr-footer{grid-template-columns:1fr !important;}
  }
  @media (max-width:440px){
    .mr-grid-4{grid-template-columns:1fr !important;}
    .mr-corner{display:none !important;}
  }

  /* Hover states via CSS */
  .btn-primary{transition:background .2s,transform .22s,box-shadow .25s;}
  .btn-primary:hover{background:#34F5D0 !important;transform:translateY(-2px);}
  .btn-outline:hover{border-color:#00D6A1 !important;background:rgba(0,214,161,0.06) !important;transform:translateY(-2px);}
  .card-hover:hover{border-color:rgba(0,214,161,0.45) !important;background:#0A1411 !important;}
  .pill-hover:hover{border-color:rgba(0,214,161,0.45) !important;color:#EAF6F2 !important;background:rgba(0,214,161,0.08) !important;}
  .lang-btn:hover{background:rgba(0,214,161,0.1) !important;}
  input:focus,textarea:focus{border-color:#00D6A1 !important;outline:none;}

  #sent-msg{display:none;}
  #sent-msg.visible{display:flex;}
</style>

// ─── Helpers ─────────────────────────────────────────────────────────────────
function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === 'className') el.className = v;
      else if (k === 'style') el.style.cssText = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    });
  }
  children.forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c instanceof Node) el.appendChild(c);
  });
  return el;
}

function h(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstChild;
}

          <button id="cf-submit" type="button" class="btn-primary" style="margin-top:6px;display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:600;letter-spacing:0.04em;color:#070D0C;background:#00D6A1;border:none;padding:15px 26px;border-radius:3px;cursor:pointer;box-shadow:0 0 28px rgba(0,214,161,0.4);">${t.contact.form.submit} <span style="font-size:15px;">${arrow}</span></button>
          <div id="sent-msg" style="display:none;align-items:center;gap:11px;background:rgba(0,214,161,0.08);border:1px solid rgba(0,214,161,0.3);border-radius:3px;padding:13px 15px;margin-top:4px;">
            <span style="flex-shrink:0;width:7px;height:7px;background:#00D6A1;border-radius:50%;box-shadow:0 0 10px #00D6A1;"></span>
            <span id="sent-text" style="font-size:13.5px;line-height:1.5;color:#D4E5E0;">${t.contact.form.sent}</span>
          </div>
        </div>
      </div>
    </div>
  </section>`);

  // ── Footer ──
  const footer = h(`<footer style="position:relative;z-index:5;border-top:1px solid rgba(0,214,161,0.12);background:rgba(7,13,12,0.6);">
    <div class="mr-footer" style="max-width:1320px;margin:0 auto;padding:clamp(40px,5vw,60px) clamp(20px,5vw,48px);display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:32px;align-items:start;">
      <div>
        <img src="assets/maras-logo.png" alt="Maras Solutions" style="height:74px;width:auto;filter:drop-shadow(0 0 12px rgba(0,214,161,0.3));margin-bottom:18px;"/>
        <p style="font-size:14px;line-height:1.7;color:#7d938c;max-width:36ch;">${t.footer.tagline}</p>
      </div>
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:${ls};color:#5d7a72;margin-bottom:16px;">${t.footer.navLabel}</div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          ${['about','why','services','products','process','contact'].map(k=>`<a href="#${k}" style="font-size:14px;color:#A9BEB7;text-decoration:none;" class="mr-footer">${t.nav[k]}</a>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:${ls};color:#5d7a72;margin-bottom:16px;">${t.footer.connectLabel}</div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#00D6A1;" dir="ltr">hello@maras.solutions</span>
          <a href="#" style="font-size:14px;color:#A9BEB7;text-decoration:none;" class="mr-footer">LinkedIn</a>
          <span style="font-size:14px;color:#A9BEB7;">${t.footer.location}</span>
        </div>
      </div>
    </div>
    <div style="border-top:1px solid rgba(0,214,161,0.1);">
      <div style="max-width:1320px;margin:0 auto;padding:18px clamp(20px,5vw,48px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5d7a72;">${t.footer.rights}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#3a5650;">${t.footer.built}</span>
      </div>
    </div>
  </footer>`);

  // ── Assemble main wrapper ──
  const wrapper = h(`<div dir="${dir}" style="position:relative;min-height:100vh;background:#070D0C;color:#E8F3F0;font-family:'Space Grotesk','IBM Plex Sans Arabic',sans-serif;overflow:hidden;"></div>`);
  wrapper.append(bgGrid, bgGlow, bgScan, bgVig, cTL, cTR, cBL, cBR, header);

  const main = h(`<main style="position:relative;z-index:5;max-width:1320px;margin:0 auto;padding:0 clamp(20px,5vw,48px);"></main>`);
  main.append(heroSection, diffSection, pillarsSection, whySection, servicesSection, productsSection, processSection, aboutSection, industriesSection, contactSection);
  wrapper.append(main, footer);

  return wrapper;
}

// ─── Init & Render ────────────────────────────────────────────────────────────
function render(lang) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const page = buildPage(lang);
  app.appendChild(page);

  // Lang toggle
  document.getElementById('lang-btn').addEventListener('click', () => {
    currentLang = currentLang === 'en' ? 'ar' : 'en';
    try { localStorage.setItem('maras-lang', currentLang); } catch(e) {}
    try {
      const url = new URL(location.href);
      url.searchParams.set('lang', currentLang);
      history.replaceState(null, '', url.toString());
    } catch(e) {}
    render(currentLang);
    initReveal();
  });

  // Contact form
  const submitBtn = document.getElementById('cf-submit');
  if (submitBtn) {
    submitBtn.addEventListener('click', () => {
      const tf = CONTENT[currentLang].contact.form;
      const name    = (document.getElementById('cf-name')?.value || '').trim();
      const company = (document.getElementById('cf-company')?.value || '').trim();
      const phone   = (document.getElementById('cf-phone')?.value || '').trim();
      const email   = (document.getElementById('cf-email')?.value || '').trim();
      const msg     = (document.getElementById('cf-msg')?.value || '').trim();
      const lines = [
        tf.name + ': ' + name,
        tf.company + ': ' + company,
        tf.phone + ': ' + phone,
        tf.email + ': ' + email,
        '',
        tf.message + ':',
        msg
      ];
      const subject = 'Website inquiry — ' + (company || name || 'New contact');
      const href = 'mailto:hello@maras.solutions'
        + '?subject=' + encodeURIComponent(subject)
        + '&body=' + encodeURIComponent(lines.join('\n'));
      try { window.location.href = href; } catch(err) {}
      const sentEl = document.getElementById('sent-msg');
      if (sentEl) sentEl.style.display = 'flex';
    });
  }
}

// ─── Scroll Reveal ────────────────────────────────────────────────────────────
function initReveal() {
  document.documentElement.classList.add('mr-js');
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce || !('IntersectionObserver' in window)) {
    document.querySelectorAll('[data-reveal]').forEach(n => n.classList.add('mr-in'));
    return;
  }
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('mr-in'); io.unobserve(e.target); } });
  }, { threshold: 0.1, rootMargin: '0px 0px -7% 0px' });
  document.querySelectorAll('[data-reveal]').forEach(n => io.observe(n));
}

// ─── Boot — runs synchronously, no external dependency ───────────────────────
render(currentLang);
initReveal();
</script>
</body>
